<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0f14" />
  <title>FitTracker Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN
═══════════════════════════════════════════ -->
<div id="page-login" class="page-login hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">⚡</div>
      <h1>FitTracker Pro</h1>
      <p>Gestión de entrenamiento personal</p>
    </div>
    <div id="login-error" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <!-- Top bar (mobile) -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="logo-bolt">⚡</span>
      <span class="logo-name">FitTracker</span>
    </div>
    <div class="topbar-right">
      <span id="topbar-badge" class="topbar-badge hidden"></span>
      <button class="topbar-search-btn" onclick="openSearch()" aria-label="Buscar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menú">☰</button>
    </div>
  </header>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-bolt">⚡</span>
      <div>
        <span class="logo-name">FitTracker</span>
        <span class="logo-sub">Pro</span>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
        <span id="nav-badge" class="nav-badge hidden"></span>
      </button>
      <button class="nav-item" data-page="clientes" onclick="navigate('clientes')">
        <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
      </button>
      <button class="nav-item" data-page="calendario" onclick="navigate('calendario')">
        <span class="nav-icon">📅</span><span class="nav-label">Calendario</span>
      </button>
      <button class="nav-item" data-page="pagos" onclick="navigate('pagos')">
        <span class="nav-icon">💰</span><span class="nav-label">Pagos</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar modo de color" title="Modo claro / oscuro">
        <span class="nav-icon" id="theme-icon">☀️</span>
        <span class="nav-label" id="theme-label">Modo claro</span>
        <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
      </button>
      <!-- ── Notificaciones toggle ── -->
      <button class="theme-toggle notif-toggle" id="notif-toggle-btn" onclick="toggleNotifications()" aria-label="Activar/desactivar notificaciones">
        <span class="nav-icon" id="notif-icon">🔔</span>
        <span class="nav-label">Notificaciones</span>
        <span class="theme-toggle-track notif-toggle-track" id="notif-track">
          <span class="theme-toggle-thumb notif-toggle-thumb" id="notif-thumb"></span>
        </span>
      </button>
      <button class="nav-item logout-btn" onclick="doLogout()">
        <span class="nav-icon">🚪</span><span class="nav-label">Salir</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main-content" class="main-content">

    <!-- ── DASHBOARD ── -->
    <div id="page-dashboard" class="page dash-page">
      <!-- Hero -->
      <div class="dash-hero">
        <div class="dash-hero-left">
          <div class="dash-greeting" id="dash-greeting">Buenos días</div>
          <div class="dash-hero-metric">
            <span class="dash-hero-number" id="dash-hero-sessions">—</span>
            <span class="dash-hero-unit">sesiones hoy</span>
          </div>
          <span class="dash-date-label" id="dash-date"></span>
        </div>
        <div id="dash-alerts"></div>
      </div>

      <!-- KPI row -->
      <div class="dash-kpi-row" id="dash-stats"></div>

      <!-- Timeline sesiones hoy -->
      <div class="dash-section">
        <div class="dash-section-header">
          <span class="dash-section-label">Hoy</span>
          <button class="btn btn-sm btn-outline" onclick="navigate('calendario')">Ver calendario</button>
        </div>
        <div id="dash-today"></div>
      </div>

      <!-- Charts -->
      <div class="dash-section">
        <div class="dash-charts-row">
          <div class="dash-chart-wrap">
            <span class="dash-chart-label">Sesiones / 7 días</span>
            <div class="dash-chart-canvas-ses"><canvas id="chart-sesiones"></canvas></div>
          </div>
          <div class="dash-chart-wrap">
            <span class="dash-chart-label">Ingresos / 6 meses</span>
            <div class="dash-chart-canvas-ing"><canvas id="chart-ingresos"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Bonos rings -->
      <div class="dash-section">
        <div class="dash-section-header">
          <span class="dash-section-label">Bonos</span>
          <button class="btn btn-sm btn-outline" onclick="navigate('clientes')">Ver todos</button>
        </div>
        <div id="dash-bonos" class="dash-rings-row"></div>
      </div>
    </div>

    <!-- ── CLIENTES ── -->
    <div id="page-clientes" class="page hidden">
      <div class="page-header">
        <h1>Clientes</h1>
        <button class="btn btn-primary" onclick="openClientModal()">+ Nuevo cliente</button>
      </div>
      <div class="toolbar">
        <input class="search-input" type="search" placeholder="Buscar..." oninput="renderClientes()" id="client-search" />
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="setClientFilter('all')">Todos</button>
          <button class="filter-tab" data-filter="active" onclick="setClientFilter('active')">Activos</button>
          <button class="filter-tab" data-filter="alert" onclick="setClientFilter('alert')">⚠️ Alertas</button>
        </div>
      </div>
      <div id="clients-grid" class="clients-grid"></div>
    </div>

    <!-- ── CALENDARIO ── -->
    <div id="page-calendario" class="page hidden">
      <div class="page-header">
        <h1>Calendario</h1>
        <div class="week-nav">
          <button class="btn btn-outline btn-sm" onclick="changeWeek(-1)">← Ant</button>
          <span id="week-label" class="week-label"></span>
          <button class="btn btn-outline btn-sm" onclick="changeWeek(1)">Sig →</button>
          <button class="btn btn-sm btn-primary" onclick="goToday()">Hoy</button>
        </div>
      </div>
      <div class="calendar-wrapper">
        <div id="calendar-grid" class="calendar-grid"></div>
      </div>
      <!-- Legend -->
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot ld-scheduled"></div> Programada</div>
        <div class="cal-legend-item"><div class="cal-legend-dot ld-completed"></div> Completada</div>
        <div class="cal-legend-item"><div class="cal-legend-dot ld-pending"></div> Pendiente confirmación</div>
        <div class="cal-legend-item"><div class="cal-legend-dot ld-cancelled"></div> Cancelada</div>
      </div>
      <!-- Week summary -->
      <div id="week-summary" class="week-summary"></div>
    </div>

    <!-- ── PAGOS ── -->
    <div id="page-pagos" class="page hidden">
      <div class="page-header">
        <h1>Pagos</h1>
        <div class="month-nav">
          <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">← Ant</button>
          <span id="month-label" class="month-label"></span>
          <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">Sig →</button>
        </div>
      </div>
      <div id="payments-summary" class="stats-grid" style="margin-bottom:24px"></div>
      <div id="payments-list" class="payments-list"></div>
    </div>

    <!-- ── DETALLE CLIENTE ── -->
    <div id="page-client-detail" class="page hidden"></div>

  </main>

  <!-- Bottom nav (phones) -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">🏠</span><span>Dashboard</span>
      <span id="bottom-badge" class="bottom-badge hidden"></span>
    </button>
    <button class="bottom-nav-item" data-page="clientes" onclick="navigate('clientes')">
      <span class="nav-icon">👥</span><span>Clientes</span>
    </button>
    <button class="bottom-nav-item" data-page="calendario" onclick="navigate('calendario')">
      <span class="nav-icon">📅</span><span>Calendario</span>
    </button>
    <button class="bottom-nav-item" data-page="pagos" onclick="navigate('pagos')">
      <span class="nav-icon">💰</span><span>Pagos</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════════════════════════
     MODALS
═══════════════════════════════════════════ -->

<!-- Modal Cliente -->
<div id="modal-client" class="modal-overlay hidden" onclick="closeModalClient(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-client-title">Nuevo Cliente</h2>
      <button class="close-btn" onclick="closeModalClient()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="client-id" />
      <div class="form-row">
        <div class="form-group">
          <label>Nombre *</label>
          <input id="c-name" placeholder="Nombre completo" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input id="c-phone" placeholder="600 000 000" type="tel" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="c-email" placeholder="cliente@email.com" type="email" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo de pago</label>
          <select id="c-payment-type" onchange="toggleBonoFields()">
            <option value="bono">Bono de sesiones</option>
            <option value="mensual">Mensual</option>
            <option value="individual">Sesión individual</option>
          </select>
        </div>
        <div class="form-group" id="bono-size-group">
          <label>Sesiones del bono</label>
          <input id="c-bono-size" type="number" value="10" min="1" />
        </div>
        <div class="form-group" id="sessions-left-group">
          <label>Sesiones restantes</label>
          <input id="c-sessions-left" type="number" value="10" min="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <textarea id="c-notes" placeholder="Objetivos, observaciones..."></textarea>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="c-active" checked />
          Cliente activo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button id="btn-delete-client" class="btn btn-danger btn-sm hidden" onclick="deleteClient()">🗑️ Eliminar</button>
      <button class="btn btn-outline" onclick="closeModalClient()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal Sesión (Calendario) -->
<div id="modal-slot" class="modal-overlay hidden" onclick="closeModalSlot(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-slot-title">Nueva Sesión</h2>
      <button class="close-btn" onclick="closeModalSlot()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="slot-id" />

      <!-- Tipo -->
      <div class="form-group">
        <label>Tipo</label>
        <select id="s-type" onchange="toggleSlotFields()">
          <option value="client">Sesión con cliente</option>
          <option value="block">Bloqueado</option>
          <option value="free">Libre</option>
        </select>
      </div>

      <!-- Cliente (solo si tipo=client) -->
      <div class="form-group" id="slot-client-group">
        <label>Cliente</label>
        <select id="s-client"></select>
      </div>

      <!-- Título (tipo != client) -->
      <div class="form-group hidden" id="slot-title-group">
        <label>Título</label>
        <input id="s-title" placeholder="Ej: Reunión..." />
      </div>

      <!-- Fecha / Hora / Duración -->
      <div class="form-row">
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="s-date" />
        </div>
        <div class="form-group">
          <label>Hora inicio</label>
          <div class="time-row">
            <select id="s-hour"></select>
            <span style="color:var(--text2);font-weight:700">:</span>
            <select id="s-min"></select>
          </div>
        </div>
        <div class="form-group">
          <label>Duración</label>
          <select id="s-duration">
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60" selected>1 hora</option>
            <option value="90">1:30 h</option>
            <option value="120">2 horas</option>
          </select>
        </div>
      </div>

      <!-- Estado (solo al editar) -->
      <div class="form-group" id="slot-status-group" style="display:none">
        <label>Estado</label>
        <select id="s-status" onchange="updateStatusPreview()">
          <option value="scheduled">✅ Programada</option>
          <option value="pending">⏳ Pendiente confirmación</option>
          <option value="cancelled">❌ Cancelada</option>
          <option value="completed">☑️ Completada</option>
        </select>
      </div>

      <!-- Notas -->
      <div class="form-group">
        <label>Notas</label>
        <input id="s-notes" placeholder="Observaciones..." />
      </div>

      <!-- ── REPETICIÓN (solo nueva sesión) ── -->
      <div id="repeat-section">
        <div class="form-group" style="margin-bottom:8px">
          <label class="checkbox-label">
            <input type="checkbox" id="s-repeat" onchange="toggleRepeatBox()" />
            Repetir esta sesión semanalmente
          </label>
        </div>
        <div id="repeat-box" class="repeat-box hidden">
          <div class="form-group">
            <label>Días de la semana</label>
            <div class="days-picker" id="days-picker">
              <button type="button" class="day-btn" data-day="1">Lun</button>
              <button type="button" class="day-btn" data-day="2">Mar</button>
              <button type="button" class="day-btn" data-day="3">Mié</button>
              <button type="button" class="day-btn" data-day="4">Jue</button>
              <button type="button" class="day-btn" data-day="5">Vie</button>
              <button type="button" class="day-btn" data-day="6">Sáb</button>
              <button type="button" class="day-btn" data-day="0">Dom</button>
            </div>
          </div>
          <div class="form-group">
            <label>Total de sesiones</label>
            <select id="s-weeks" onchange="updateRepeatPreview()">
              <option value="4">4 sesiones</option>
              <option value="6">6 sesiones</option>
              <option value="8">8 sesiones</option>
              <option value="10">10 sesiones</option>
              <option value="12" selected>12 sesiones</option>
              <option value="16">16 sesiones</option>
              <option value="20">20 sesiones</option>
              <option value="24">24 sesiones</option>
            </select>
            <small id="repeat-preview" style="color:var(--text2);font-size:11px;margin-top:4px;display:block"></small>
          </div>
        </div>
      </div>

    </div><!-- /modal-body -->

    <div class="modal-footer">
      <button id="btn-delete-slot" class="btn btn-danger btn-sm hidden" onclick="deleteSlot()">🗑️ Eliminar</button>
      <button id="btn-complete-slot" class="btn btn-success btn-sm hidden" onclick="completeSlot()">☑️ Completar</button>
      <button class="btn btn-outline" onclick="closeModalSlot()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSlot()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal Pago -->
<div id="modal-payment" class="modal-overlay hidden" onclick="closeModalPayment(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Registrar Pago</h2>
      <button class="close-btn" onclick="closeModalPayment()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="payment-id" />
      <div class="form-group">
        <label>Cliente</label>
        <select id="p-client"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Importe (€)</label>
          <input id="p-amount" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="p-date" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Concepto</label>
          <select id="p-concept">
            <option value="bono">Bono de sesiones</option>
            <option value="mensual">Mensualidad</option>
            <option value="individual">Sesión individual</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group" id="p-bono-group">
          <label>Sesiones del bono</label>
          <input id="p-sessions" type="number" min="1" value="10" />
        </div>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <input id="p-notes" placeholder="Observaciones..." />
      </div>
    </div>
    <div class="modal-footer">
      <button id="btn-delete-payment" class="btn btn-danger btn-sm hidden" onclick="deletePayment()">🗑️ Eliminar</button>
      <button class="btn btn-outline" onclick="closeModalPayment()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePayment()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     GLOBAL SEARCH MODAL
═══════════════════════════════════════════ -->
<div id="search-overlay" class="search-overlay hidden" onclick="closeSearch(event)">
  <div class="search-modal" role="dialog" aria-label="Búsqueda global">
    <div class="search-input-wrap">
      <svg class="search-icon-inner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-global-input" class="search-global-input" type="search" placeholder="Buscar clientes, sesiones, pagos..." autocomplete="off" oninput="runSearch(this.value)" />
      <kbd class="search-esc-hint">ESC</kbd>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     FIREBASE + APP JS

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
<!-- Calendar event tooltip -->
<div id="cal-tooltip" role="tooltip" aria-hidden="true"></div>
<script>
  (function() {
    const tip = document.getElementById('cal-tooltip');
    const statusClass = {
      'Programada': 's-scheduled',
      'Completada': 's-completed',
      'Pendiente confirmación': 's-pending',
      'Cancelada': 's-cancelled'
    };
    let hideTimer;

    function showTooltip(el, e) {
      clearTimeout(hideTimer);
      const name   = el.dataset.tooltipName   || '';
      const time   = el.dataset.tooltipTime   || '';
      const dur    = el.dataset.tooltipDur    || '';
      const status = el.dataset.tooltipStatus || '';
      const sCls   = statusClass[status] || 's-scheduled';
      tip.innerHTML = `
        <div class="tt-name">${name}</div>
        <div class="tt-row"><span>🕐</span><span>${time}</span></div>
        <div class="tt-row"><span>⏱</span><span>${dur}</span></div>
        <span class="tt-status ${sCls}">${status}</span>`;
      positionTooltip(e);
      tip.classList.add('visible');
      tip.setAttribute('aria-hidden', 'false');
    }

    function positionTooltip(e) {
      const margin = 12;
      const tw = tip.offsetWidth || 200;
      const th = tip.offsetHeight || 100;
      let x = e.clientX + margin;
      let y = e.clientY + margin;
      if (x + tw > window.innerWidth  - margin) x = e.clientX - tw - margin;
      if (y + th > window.innerHeight - margin) y = e.clientY - th - margin;
      tip.style.left = x + 'px';
      tip.style.top  = y + 'px';
    }

    function hideTooltip() {
      hideTimer = setTimeout(() => {
        tip.classList.remove('visible');
        tip.setAttribute('aria-hidden', 'true');
      }, 80);
    }

    document.addEventListener('mouseover', e => {
      const el = e.target.closest('[data-tooltip-name]');
      if (el) showTooltip(el, e);
      else if (!tip.contains(e.target)) hideTooltip();
    });
    document.addEventListener('mousemove', e => {
      if (tip.classList.contains('visible')) positionTooltip(e);
    });
    document.addEventListener('mouseout', e => {
      if (!e.relatedTarget?.closest('[data-tooltip-name]')) hideTooltip();
    });
    document.addEventListener('click', hideTooltip);
    document.addEventListener('scroll', hideTooltip, true);
  })();
</script>
</body>
</html>
